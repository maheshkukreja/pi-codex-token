name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
      - run: npm install
      - run: npm run check
      - run: npm run check-exports
      - run: npm test
      # The live smoke test (npm run smoke) is intentionally NOT run here: it hits
      # the real codex backend and needs a CODEX_ACCESS_TOKEN secret. Run it from a job
      # with `env: CODEX_ACCESS_TOKEN: ${{ secrets.CODEX_ACCESS_TOKEN }}` for drift alerts.
