name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm install
      - run: npm run check
      - run: npm run check-exports
      - run: npm test
      # The live smoke test (npm run smoke) is intentionally NOT run here: it hits
      # the real codex backend and needs a CODEX_ACCESS_TOKEN secret. Run it from a job
      # with `env: CODEX_ACCESS_TOKEN: ${{ secrets.CODEX_ACCESS_TOKEN }}` for drift alerts.
